name: Publish Update Check
on:
  push:
    branches: [main]
    paths:
      - 'plugin-source/dev/versions.json'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from versions.json
        id: version
        run: |
          VERSIONS_JSON="plugin-source/dev/versions.json"
          LONGVERSION=$(jq -r 'keys | map(tonumber) | max | tostring' $VERSIONS_JSON)
          VERSION=$(jq -r ".[\"$LONGVERSION\"]" $VERSIONS_JSON)
          PLUGIN_DIR="${GITHUB_REPOSITORY##*/}"
          PLUGIN_DIR="${PLUGIN_DIR#ips4-}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "longversion=$LONGVERSION" >> $GITHUB_OUTPUT
          echo "plugin_dir=$PLUGIN_DIR" >> $GITHUB_OUTPUT

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.UPDATES_DEPLOY_KEY }}

      - name: Publish to ips4-updates repo
        run: |
          git clone git@github.com:XENNTEC-UG/ips4-updates.git updates
          cd updates

          PLUGIN="${{ steps.version.outputs.plugin_dir }}"
          REPO="${{ github.repository }}"
          RELEASED=$(date +%s)
          TAG="${{ github.event.release.tag_name }}"

          if [ -n "$TAG" ]; then
            NOTES="https://github.com/${REPO}/releases/tag/${TAG}"
          else
            NOTES="https://github.com/${REPO}/releases"
          fi

          cat > "${PLUGIN}.json" <<ENDJSON
          {
              "version": "${{ steps.version.outputs.version }}",
              "longversion": ${{ steps.version.outputs.longversion }},
              "released": ${RELEASED},
              "updateurl": "https://github.com/${REPO}/releases",
              "releasenotes": "${NOTES}"
          }
          ENDJSON

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${PLUGIN}.json"
          git diff --cached --quiet || {
            git commit -m "Update ${PLUGIN} to ${{ steps.version.outputs.version }}"
            git pull --rebase
            git push
          }
